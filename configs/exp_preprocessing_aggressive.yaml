name: exp_preprocessing_aggressive
collection_name: hse_prep_aggressive
qdrant_host: localhost
qdrant_port: 6333

preprocessing:
  lowercase: true
  remove_extra_whitespace: true
  remove_page_numbers: true
  remove_headers_footers: true

chunker:
  type: recursive
  size: 1200
  overlap: 200

embedder:
  type: sentence_transformer
  model: intfloat/multilingual-e5-base

retriever:
  type: dense
  top_k: 5

reranker:
  type: none

generator:
  type: none
